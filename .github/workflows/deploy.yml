name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch: {} # allow manual runs from the Actions tab

concurrency:
  group: deploy-prod
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22 # wrangler 4.x requires Node >= 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Apply new D1 migrations. Non-blocking: prod DB was seeded directly, so
      # wrangler's tracker may not match — a failure here must not stop deploy.
      # Uses the project's pinned wrangler (no action-installed version clash).
      - name: Apply D1 migrations
        continue-on-error: true
        run: npx wrangler d1 migrations apply portfolio --remote

      - name: Deploy Worker
        run: npx wrangler deploy
